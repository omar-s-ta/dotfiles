# yaml-language-server: $schema=https://www.gh-dash.dev/schema.json
prSections:
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
    - title: Recently Merged
      filters: is:merged author:@me sort:updated-desc
issuesSections:
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Participating
      filters: reason:participating
    - title: Mentioned
      filters: reason:mention
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
    - title: Subscribed
      filters: reason:subscribed
    - title: Team Mentioned
      filters: reason:team-mention
repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60
defaults:
    preview:
        open: true
        width: 0.45
        height: 0.6
        position: auto
    prsLimit: 20
    prApproveComment: ""
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            labels:
                width: 22
                hidden: true
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 30
keybindings:
    prs:
        - key: O
          builtin: checkout
        - key: M
          name: squash merge
          command: gh pr merge --squash --repo {{.RepoName}} {{.PrNumber}}
        - key: y
          name: copy url
          command: >
            gh issue view {{.IssueNumber}} --repo {{.RepoName}} --json url --jq '.url' | pbcopy
repoPaths:
    :owner/:repo: ~/development/:repo
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
    colors:
      text:
          primary: "#D8DEE9"     # nord4
          secondary: "#81A1C1"   # nord9
          faint: "#4C566A"       # nord3
          inverted: "#2E3440"    # nord0
          warning: "#BF616A"     # nord11 (red)
          success: "#A3BE8C"     # nord14 (green)
      background:
          selected: "#3B4252"    # nord1
      border:
          primary: "#4C566A"     # nord3
          secondary: "#434C5E"   # nord2
          faint: "#2E3440"       # nord0
pager:
    diff: delta
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
