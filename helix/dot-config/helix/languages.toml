# LSP / formatter config mirroring my nvim (LazyVim) language setup.
# NOTE: many of these servers are installed by Mason inside nvim and are NOT on
# your PATH. Helix needs them globally. Installed & working today:
#   clangd, rust-analyzer, metals, terraform-ls
# The rest are configured but require installing the binary (see chat notes).

########################  C / C++  ########################
# nvim: clangd with
[language-server.clangd]
command = "clangd"
args = ["--clang-tidy", "--header-insertion=iwyu", "-j=5", "--malloc-trim"]

[[language]]
name = "cpp"
auto-format = true
language-servers = [
  "clangd",
  { name = "efm", only-features = [
    "diagnostics",
  ] }, # clang-analyzer and cppcheck lints
]
file-types = [
  "cc",
  "ccm",
  "cxx",
  "cxxm",
  "c++",
  "c++m",
  "cpp",
  "cppm",
  "hxx",
  "hpp",
]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "c"
anguage-servers = [
  "clangd",
  { name = "efm", only-features = [
    "diagnostics",
  ] }, # gcc, clang-analyzer and cppcheck lints
]
file-types = ["c", "h"]
indent = { tab-width = 2, unit = "  " }

########################  Lua  ########################
[[language]]
name = "lua"
language-servers = [
  { name = "lua-language-server", except-features = ["format"] },
  { name = "efm", only-features = ["diagnostics", "code-action"] }, # for selene
]
formatter = { command = "stylua", args = ["-"] }
auto-format = true

[language-server.lua-language-server.config.Lua]
format.enable = false
runtime.version = "LuaJIT"
diagnostics.globals = ["vim"]
workspace.library = [
  "/usr/share/nvim/runtime/lua",
  "/usr/share/nvim/runtime/lua/vim",
  "/usr/share/nvim/runtime/lua/vim/lsp",
]

########################  Scala (metals)  ########################
# nvim: nvim-metals with inlay hints, implicit args, semantic highlighting
[language-server.metals]
command = "metals"

[language-server.metals.config]
"metals.defaultBspToBuildTool" = true
"metals.inlayHints.inferredTypes.enable" = true
"metals.inlayHints.typeParameters.enable" = true
"metals.inlayHints.implicitArguments.enable" = true
"metals.inlayHints.implicitConversions.enable" = true
"metals.inlayHints.hintsInPatternMatch.enable" = true
"metals.showImplicitArguments" = true
"metals.enableSemanticHighlighting" = true
"metals.testUserInterface" = "Test Explorer"
"metals.excludedPackages" = ["akka.actor.typed.javadsl", "com.github.swagger.akka.javadsl"]

[[language]]
name = "scala"
language-servers = ["metals"]
auto-format = true
indent = { tab-width = 2, unit = "  " }

########################  Rust  ########################
[language-server.rust-analyzer.config.rust-analyzer]
check.command = "clippy"
check.features = "all"
completion.fullFunctionSignatures.enable = true
diagnostics.experimental.enable = true
diagnostics.styleLints.enable = true
hover.actions.references.enable = true
hover.memoryLayout.niche = true
inlayHints.bindingModeHints.enable = true
inlayHints.closingBraceHints.minLines = 1
inlayHints.closureCaptureHints.enable = true
inlayHints.closureReturnTypeHints.enable = "always"           # with_block
inlayHints.closureStyle = "rust_analyzer"                     # impl_fn | with_id
inlayHints.discriminantHints.enable = "always"                # fieldless
inlayHints.expressionAdjustmentHints.enable = "reborrow"
inlayHints.genericParameterHints.lifetime.enable = true
inlayHints.genericParameterHints.type.enable = true
inlayHints.implicitDrops.enable = false
inlayHints.lifetimeElisionHints.enable = "always"             # skip_trivial
inlayHints.lifetimeElisionHints.useParameterNames = true
inlayHints.rangeExclusiveHints.enable = true
interpret.tests = true
lens.references.adt.enable = true
lens.references.enumVariant.enable = true
lens.references.method.enable = true
lens.references.trait.enable = true
semanticHighlighting.operator.specialization.enable = true
semanticHighlighting.punctuation.separate.macro.bang = true
semanticHighlighting.punctuation.specialization.enable = true
typing.autoClosingAngleBrackets.enable = true

[[language]]
name = "rust"
auto-format = true

########################  Python  ########################
# nvim: pyright + ruff. Install with: pipx install pyright ruff  (or uv tool install)
[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.pyright.config.python.analysis]
typeCheckingMode = "basic"

[language-server.ruff]
command = "ruff"
args = ["server"]

[[language]]
name = "python"
language-servers = ["pyright", "ruff"]
formatter = { command = "ruff", args = ["format", "-"] }
auto-format = true
indent = { tab-width = 4, unit = "    " }

########################  Bash / Zsh  ########################
# nvim: bashls for sh + zsh.  Install: npm i -g bash-language-server
[[language]]
name = "bash"
indent = { tab-width = 2, unit = "  " }

########################  Go  ########################
[[language]]
name = "go"
auto-format = true

########################  TypeScript / JS (prettier)  ########################
# Install prettier: npm i -g prettier ; typescript-language-server
[[language]]
name = "typescript"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "javascript"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "babel"] }

[[language]]
name = "tsx"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }

########################  JSON / YAML / TOML  ########################
[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[language]]
name = "json"
language-servers = [
  { name = "vscode-json-language-server", except-features = [
    "format",
  ] },
  "biome",
]
formatter = { command = "prettier", args = ["--parser", "json"] }
auto-format = true

[[language]]
name = "jsonc"
language-servers = [
  { name = "vscode-json-language-server", except-features = [
    "format",
  ] },
  "biome",
]
auto-format = true

[[language]]
name = "yaml"
auto-format = true
indent = { tab-width = 2, unit = "  " }
file-types = ["yml", "yaml", { glob = "phpstan.neon" }]

[[language]]
name = "toml"
formatter = { command = "taplo", args = ["format", "-"] }
auto-format = true

########################  Terraform  ########################
[[language]]
name = "hcl"
auto-format = true

########################  Markdown (prettier)  ########################
[[language]]
name = "markdown"
language-servers = ["marksman"]
formatter = { command = "prettier", args = ["--parser", "markdown"] }

[language]]
name = "git-config"
file-types = [
  { glob = "git/config" },
  { glob = ".gitmodules" },
  { glob = ".gitconfig" },
  { glob = ".git/config" },
  { glob = ".config/git/config" },
]

[[language]]
name = "dockerfile"
language-servers = [
  "docker-langserver",
  { name = "efm", only-features = [
    "code-action",
    "diagnostics",
  ] }, # for hadolint
]

[[language]]
name = "html"
language-servers = [
  "vscode-html-language-server",
  "superhtml",
  "tailwindcss-lsp",
]

