# Helix config aimed at matching my LazyVim/nvim setup as closely as Helix allows.
# See languages.toml for LSP/formatter config.

theme = "nord-custom"

[editor]
scrolloff = 10
line-number = "relative"
cursorline = true
bufferline = "multiple"
color-modes = true
true-color = true
popup-border = "all"
rulers = []
completion-trigger-len = 1
auto-format = true
# nvim: clipboard = "unnamedplus" — y/p use the system clipboard so you can
# paste into any other app (and paste from it back into Helix).
default-yank-register = "+"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
# nvim: inlay hints enabled (nvim-lsp-endhints / metals inlayHints)
display-inlay-hints = true
display-messages = true
display-progress-messages = true
snippets = true
goto-reference-include-declaration = true

[editor.indent-guides]
render = true
character = "│"
skip-levels = 1

[editor.gutters]
# gitsigns-style diff column + diagnostics, line numbers, folds(none)
layout = ["diagnostics", "spacer", "line-numbers", "spacer", "diff"]

# nvim: opt.list + listchars = { tab = "» ", trail = "·", nbsp = "␣" }
[editor.whitespace]
render = { tab = "all", nbsp = "all", trailing = "all" }

[editor.whitespace.characters]
tab = "»"
tabpad = " "
nbsp = "␣"
trailing = "·"

[editor.file-picker]
# nvim/snacks searched hidden files (e.g. Sphere command); mirror that
hidden = false
git-ignore = true

[editor.soft-wrap]
enable = false

[editor.smart-tab]
enable = true

#########################
#  Keybindings
#########################

[keys.normal]
# nvim: <C-d>/<C-u> then zz (center)
"C-d" = ["half_page_down", "align_view_center"]
"C-u" = ["half_page_up", "align_view_center"]

# Mirror <C-o> (jump backward in the jumplist) onto <C-t> as well.
"C-t" = "jump_backward"

# nvim: G -> G$  (last line, end of line)
"G" = ["goto_last_line", "goto_line_end"]

# Split navigation with Alt+h/j/k/l. Ctrl+h/j/k/l is left to tmux's
# vim-tmux-navigator for PANE switching; Alt is free of tmux, so it drives
# Helix SPLITS as a single chord without conflict.
"A-h" = "jump_view_left"
"A-j" = "jump_view_down"
"A-k" = "jump_view_up"
"A-l" = "jump_view_right"

# nvim: disable arrow keys in normal mode
up = "no_op"
down = "no_op"
left = "no_op"
right = "no_op"

# nvim/mini.files-style file explorer via yazi. `:insert-output` suspends Helix's
# TUI and hands yazi a real TTY (same trick as `space g g` lazygit); yazi starts
# on the current file (%{buffer_name}) and writes the picked path to a chooser
# file rather than stdout, so nothing leaks into the current buffer. `:open
# %sh{...}` (Helix 25.x command expansion) then opens the pick in this running
# instance; the `-s` guard makes quitting yazi (q) a no-op that reopens the
# current buffer instead of erroring on an empty path.
[keys.normal.space]
e = [
  ":sh rm -f /tmp/hx-yazi-chooser",
  ":insert-output yazi %{buffer_name} --chooser-file=/tmp/hx-yazi-chooser",
  ":open %sh{ [ -s /tmp/hx-yazi-chooser ] && cat /tmp/hx-yazi-chooser || echo %{buffer_name} }",
  ":redraw",
]

# nvim: <leader>bd -> close buffer.  Turning `space b` into a submenu shadows
# Helix's default buffer picker, so it's kept at `space b b`.
[keys.normal.space.b]
d = ":buffer-close"
D = ":buffer-close!"          # force-close (discard changes), like <leader>bD
b = "buffer_picker"          # preserve default `space b` picker
o = ":buffer-close-others"   # bonus: <leader>bo close other buffers

# nvim/LazyVim: <leader>gg opens lazygit; <leader>gu opens gitui. Helix
# suspends its TUI during `:insert-output`, handing the git UI a real TTY; it
# walks up from Helix's cwd to find the repo. `:new` gives a throwaway buffer
# to capture the (empty) stdout, `:buffer-close!` discards it, `:redraw`
# repaints Helix. No tmux and no nested shell quoting — which broke earlier tries.
[keys.normal.space.g]
g = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
# gitui renders to stdout, which `:insert-output` pipes away, so it can't draw
# there. Instead give it a real TTY via a tmux popup (starts in the pane's cwd;
# gitui walks up to find the repo). `%%` escapes the literal `%` from Helix's
# command-line percent expansion.
u = ":sh tmux display-popup -w 80%% -h 80%% -d '#{pane_current_path}' -E gitui"

# nvim/LazyVim: <leader>uh toggles inlay hints
[keys.normal.space.u]
h = ":toggle lsp.display-inlay-hints"

[keys.normal.g]
# nvim: gg -> gg0  (file start, then column 0 / first char)
g = ["goto_file_start", "goto_line_start"]

[keys.select]
"C-t" = "jump_backward"
"G" = ["goto_last_line", "goto_line_end"]
up = "no_op"
down = "no_op"
left = "no_op"
right = "no_op"

[keys.select.g]
g = ["goto_file_start", "goto_line_start"]
