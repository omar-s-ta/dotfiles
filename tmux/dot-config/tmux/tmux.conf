# Global settings
unbind r
bind r run-shell 'tmux source-file "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/tmux.conf"'

set-option -g history-limit 10000

set -g prefix C-s
set -g mouse on
set -g default-terminal tmux-256color
set -g status-position top
set -g base-index 1
setw -g pane-base-index 1

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Open new splits in the current pane's directory (default is the dir the tmux
# server started in). new-window (prefix c) intentionally left at the default.
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Run Claude Code in a separate session
bind -r y run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# Show clock (default prefix+t, moved since t now opens the popup shell)
bind a clock-mode

# Popup shell at the root of the current repo
bind t run-shell '\
  DIR=$(git -C "#{pane_current_path}" rev-parse --show-toplevel 2>/dev/null || echo "#{pane_current_path}"); \
  SESSION="shell-$(echo $DIR | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "$DIR"; \
  tmux display-popup -w35% -h30% \
    -x#{e|-:#{e|/:#{e|*:#{client_width},65},100},3} \
    -y#{e|/:#{e|*:#{client_height},8},10} \
    -E "tmux attach-session -t $SESSION"'

bind C-k clear-history

# Set catppuccin flavor based on system appearance (light=latte, dark=mocha)
# if-shell "defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark" \
#     "set -g @catppuccin_flavor 'mocha'" \
#     "set -g @catppuccin_flavor 'latte'"

# Configure the catppuccin plugin
# set -g @catppuccin_window_status_style "rounded"
# set -g @catppuccin_window_text " #W"
# set -g @catppuccin_window_current_text " #W"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'catppuccin/tmux#v2.1.0' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'nordtheme/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-urlview'

set -g status-right-length 100
set -g status-left-length 100
# set -g status-left ""
# set -g status-right "#{E:@catppuccin_status_session}"
# set -ag status-right "#{E:@catppuccin_status_application}"
# set -ag status-right "#{E:@catppuccin_status_directory}"
# set -agF status-right "#{E:@catppuccin_status_cpu}"

set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '"${XDG_CONFIG_HOME:-$HOME/.config}/tmux/plugins/tpm/tpm"'
